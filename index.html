<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Decoración Pequeña</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="#home" class="brand">
        <div class="brand-mark">DP</div>
        <div class="brand-text">
          <span class="brand-kicker">Tienda online</span>
          <h1>Decoración Pequeña</h1>
        </div>
      </a>
      <a id="contactShortcut" class="contact-link" href="#contacto">Contacto</a>
    </div>
  </header>

  <main id="home">
    <section id="catalogView" class="view active">
      <div class="container">
        <section class="catalog-toolbar">
          <input
            id="searchInput"
            class="search-input"
            type="text"
            placeholder="Buscar producto..."
            aria-label="Buscar producto"
          />
        </section>

        <section class="catalog-grid" id="productGrid" aria-live="polite"></section>
      </div>
    </section>

    <section id="detailView" class="view">
      <div class="container">
        <button id="backButton" class="back-button" type="button">← Volver a la tienda</button>

        <article class="product-detail">
  <section class="gallery-panel full-width-gallery">
    <div class="carousel">
      <button id="prevSlide" class="carousel-nav prev" type="button" aria-label="Foto anterior">‹</button>
      <img id="mainImage" class="main-image" src="" alt="" />
      <button id="nextSlide" class="carousel-nav next" type="button" aria-label="Foto siguiente">›</button>
    </div>
    <div id="thumbnailRow" class="thumbnail-row"></div>
  </section>

  <section class="info-panel full-width-info">
    <div class="product-meta-top">
      <span id="detailCategory" class="product-category"></span>
      <div id="detailRating" class="product-rating"></div>
    </div>

    <h2 id="detailName" class="product-title"></h2>
    <p id="detailPrice" class="product-price"></p>

    <div class="cta-row">
      <a id="buyButton" class="buy-button" href="#" target="_self" rel="noopener">Comprar</a>
    </div>

    <section class="detail-block">
      <h3>Descripción</h3>
      <p id="detailDescription"></p>
    </section>
  </section>

  <section class="info-panel full-width-info">
    <section class="detail-block">
      <h3>Comentarios de compradores</h3>
      <div id="commentsList" class="comments-list"></div>
    </section>
  </section>

  <section class="info-panel full-width-info">
    <section class="detail-block">
      <h3>Preguntas frecuentes</h3>
      <div id="qaList" class="qa-list"></div>
    </section>
  </section>
</article>

        <footer id="contacto" class="company-footer">
          <h3>Contacto</h3>
          <p><strong>Decoración Pequeña</strong></p>
          <p>Email: contacto@decoracionpequena.com</p>
          <p>Instagram: @decoracionpequena</p>
          <p>WhatsApp: +55 48 99999-9999</p>
        </footer>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
